name: Bug 报告
description: 报告可复现的功能、数据或界面问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请勿上传真实家谱或敏感照片；安全问题请按 SECURITY.md 私下报告。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明实际行为和影响。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: 版本或提交
      placeholder: 例如 0.1.0 或 git commit SHA
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options: [macOS, Windows, Linux]
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 已脱敏的日志或补充信息
      description: 如需样例项目，请先替换姓名、照片、地址等真实信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未找到同一问题。
          required: true
        - label: 此报告不包含真实家庭数据或其他敏感信息。
          required: true
