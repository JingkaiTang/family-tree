name: 功能建议
description: 提议一个有明确使用场景的改进
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题
      description: 谁在什么情况下遇到什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述最小可行行为，而不是只描述界面形式。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与取舍
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 我已阅读 README 和现有 Issue。
          required: true
        - label: 建议不依赖上传或公开真实家庭数据。
          required: true
