version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      frontend-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    groups:
      rust-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 5
